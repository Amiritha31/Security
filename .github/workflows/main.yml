name: Devops-pipeline

on:
  workflow_dispatch:

jobs:
  build-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Get PEM file
        run: |
          echo "${{ secrets.SheOps_Secret_key }}" > key.pem
          chmod 400 key.pem

      - name: Copy app.py to EC2
        run: |
          scp -o StrictHostKeyChecking=no -i key.pem app.py ec2-user@65.1.106.201:/home/ec2-user/

      - name: Copy requirements.txt to EC2
        run: |
          scp -o StrictHostKeyChecking=no -i key.pem requirements.txt ec2-user@65.1.106.201:/home/ec2-user/

      - name: Run app on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@65.1.106.201 << 'EOF'
            cd /home/ec2-user
            python3 -m venv venv
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            nohup python app.py > output.log 2>&1 &
          EOF
